services:
  - type: web
    name: datacentre-ai-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.1 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./datacentre_ai.db
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
